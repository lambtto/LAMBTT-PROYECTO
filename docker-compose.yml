version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: gastapp
      POSTGRES_PASSWORD: gastapp123
      POSTGRES_DB: gastapp_db
    ports:
      - "5432:5432"
    volumes:
      - gastapp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: gastapp
      DB_PASSWORD: gastapp123
      DB_NAME: gastapp_db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  gastapp_data:
